<svg viewBox="0 0 920 510" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <!-- Background -->
  <rect width="920" height="510" fill="#0f1117" rx="16"/>

  <!-- ── TITLE ── -->
  <text x="460" y="38" text-anchor="middle" font-size="18" font-weight="800" fill="#f8fafc">SQL Review Agent — LangGraph State Machine</text>
  <text x="460" y="56" text-anchor="middle" font-size="12" fill="#475569">static analysis → LLM loop → schema fetch → rewrite → report</text>

  <!-- ═══════════════════════════════════════════════════════
       ROW 1: INPUT → STATIC ANALYSIS → call_llm → OUTPUT
  ════════════════════════════════════════════════════════════ -->

  <!-- INPUT (w=140 h=76) center_x=90 -->
  <rect x="20" y="80" width="140" height="76" rx="10" fill="#1a1f2e" stroke="#334155" stroke-width="1.5"/>
  <text x="90" y="100" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="1.5" fill="#64748b">INPUT</text>
  <text x="90" y="120" text-anchor="middle" font-size="14" font-weight="800" fill="#f8fafc">SQL Query</text>
  <text x="90" y="140" text-anchor="middle" font-size="10" fill="#94a3b8">SELECT / WITH only</text>

  <!-- arrow → static -->
  <line x1="160" y1="118" x2="183" y2="118" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="183,113 194,118 183,123" fill="#475569"/>

  <!-- STATIC ANALYSIS (w=160 h=76) center_x=274 -->
  <rect x="194" y="80" width="160" height="76" rx="10" fill="#142a14" stroke="#22c55e" stroke-width="1.5"/>
  <text x="274" y="100" text-anchor="middle" font-size="8.5" font-weight="700" letter-spacing="1" fill="#22c55e">INSTANT · NO LLM</text>
  <text x="274" y="120" text-anchor="middle" font-size="13" font-weight="800" fill="#f8fafc">Static Analysis</text>
  <text x="274" y="140" text-anchor="middle" font-size="9" fill="#86efac">SELECT* · partitions · JOINs</text>

  <!-- arrow → call_llm -->
  <line x1="354" y1="118" x2="378" y2="118" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="378,113 389,118 378,123" fill="#475569"/>

  <!-- call_llm (w=180 h=106) center_x=479 -->
  <rect x="389" y="70" width="180" height="106" rx="12" fill="#1a2440" stroke="#4f8ef7" stroke-width="2"/>
  <rect x="389" y="70" width="180" height="8" rx="5" fill="#4f8ef7"/>
  <text x="479" y="94" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="1.5" fill="#93c5fd">NODE</text>
  <text x="479" y="116" text-anchor="middle" font-size="16" font-weight="800" fill="#f8fafc">call_llm</text>
  <text x="479" y="136" text-anchor="middle" font-size="10" fill="#93c5fd">Claude · Gemini</text>
  <text x="479" y="153" text-anchor="middle" font-size="9" fill="#64748b">get_schema · dry_run · write_report</text>
  <text x="479" y="168" text-anchor="middle" font-size="9" fill="#64748b">tools + system prompt per turn</text>

  <!-- write_report arrow → OUTPUT (right) -->
  <line x1="569" y1="118" x2="608" y2="118" stroke="#22c55e" stroke-width="2"/>
  <polygon points="608,113 619,118 608,123" fill="#22c55e"/>
  <rect x="572" y="103" width="74" height="18" rx="4" fill="#0f1117"/>
  <text x="609" y="116" text-anchor="middle" font-size="9" fill="#22c55e">write_report</text>

  <!-- OUTPUT (w=155 h=76) center_x=706 -->
  <rect x="629" y="80" width="155" height="76" rx="10" fill="#142a14" stroke="#22c55e" stroke-width="2"/>
  <rect x="629" y="80" width="155" height="8" rx="5" fill="#22c55e"/>
  <text x="706" y="100" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="1.5" fill="#dcfce7">OUTPUT</text>
  <text x="706" y="120" text-anchor="middle" font-size="14" font-weight="800" fill="#f8fafc">ReviewReport</text>
  <text x="706" y="140" text-anchor="middle" font-size="9.5" fill="#86efac">severity · cost · rewrite</text>

  <!-- ═══════════════════════════════════════════════════════
       ROW 2: run_tools (below call_llm)
  ════════════════════════════════════════════════════════════ -->

  <!-- down arrow call_llm → run_tools -->
  <line x1="479" y1="176" x2="479" y2="215" stroke="#4f8ef7" stroke-width="2"/>
  <polygon points="473,215 479,228 485,215" fill="#4f8ef7"/>
  <rect x="487" y="188" width="92" height="18" rx="4" fill="#0f1117"/>
  <text x="533" y="201" text-anchor="middle" font-size="9" fill="#fbbf24">tool_calls?  yes</text>

  <!-- run_tools (w=180 h=162) center_x=479 -->
  <rect x="389" y="238" width="180" height="162" rx="12" fill="#22153a" stroke="#a855f7" stroke-width="2"/>
  <rect x="389" y="238" width="180" height="8" rx="5" fill="#a855f7"/>
  <text x="479" y="262" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="1.5" fill="#d8b4fe">NODE</text>
  <text x="479" y="283" text-anchor="middle" font-size="16" font-weight="800" fill="#f8fafc">run_tools</text>

  <!-- tool pills (w=148 inside 180 box, padding 16px each side) -->
  <rect x="405" y="293" width="148" height="20" rx="5" fill="#1a0f2e"/>
  <text x="479" y="307" text-anchor="middle" font-size="10" fill="#c4b5fd">get_table_schema</text>
  <rect x="405" y="318" width="148" height="20" rx="5" fill="#1a0f2e"/>
  <text x="479" y="332" text-anchor="middle" font-size="10" fill="#c4b5fd">dry_run_sql</text>
  <rect x="405" y="343" width="148" height="20" rx="5" fill="#1a0f2e"/>
  <text x="479" y="357" text-anchor="middle" font-size="10" fill="#c4b5fd">write_report</text>

  <text x="479" y="385" text-anchor="middle" font-size="9" fill="#64748b">BQ read-only · safe dispatch</text>

  <!-- loop arrow: run_tools left → up → call_llm left -->
  <path d="M 389 319 Q 344 319 344 123 Q 344 70 389 70" fill="none" stroke="#a855f7" stroke-width="1.8" stroke-dasharray="6,3"/>
  <polygon points="385,65 389,70 393,75" fill="#a855f7"/>
  <rect x="304" y="186" width="62" height="18" rx="4" fill="#0f1117"/>
  <text x="335" y="199" text-anchor="middle" font-size="9" fill="#a855f7">loop back</text>

  <!-- ═══════════════════════════════════════════════════════
       LEFT COLUMN: TRIGGER MODES + SHARED STATE
  ════════════════════════════════════════════════════════════ -->

  <!-- TRIGGER MODES (w=160 h=96) center_x=100 -->
  <rect x="20" y="186" width="160" height="96" rx="10" fill="#1a1f2e" stroke="#334155" stroke-width="1.5"/>
  <text x="100" y="206" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="1.2" fill="#64748b">TRIGGER MODES</text>
  <text x="38" y="228" font-size="10.5" fill="#94a3b8">⌘  CLI — agent.py --sql</text>
  <text x="38" y="249" font-size="10.5" fill="#94a3b8">🌐  Web — server.py :5001</text>
  <text x="38" y="270" font-size="10.5" fill="#94a3b8">🔌  MCP — mcp_server.py</text>

  <!-- SHARED STATE (w=360 h=180) center_x=200 -->
  <rect x="20" y="308" width="360" height="180" rx="10" fill="#1a1f2e" stroke="#334155" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="200" y="330" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="1.2" fill="#64748b">SHARED STATE — flows through every node</text>

  <!-- state fields: bold label then normal description, all left-aligned from x=38 -->
  <!-- messages -->
  <text x="38" y="354" font-size="10.5" fill="#f8fafc" font-weight="700">messages</text>
  <text x="110" y="354" font-size="10.5" fill="#94a3b8">  conversation history (auto-appended)</text>
  <!-- sql -->
  <text x="38" y="376" font-size="10.5" fill="#f8fafc" font-weight="700">sql</text>
  <text x="110" y="376" font-size="10.5" fill="#94a3b8">  original query string</text>
  <!-- schemas -->
  <text x="38" y="398" font-size="10.5" fill="#f8fafc" font-weight="700">schemas</text>
  <text x="110" y="398" font-size="10.5" fill="#94a3b8">  table metadata from BigQuery</text>
  <!-- report_args -->
  <text x="38" y="420" font-size="10.5" fill="#f8fafc" font-weight="700">report_args</text>
  <text x="110" y="420" font-size="10.5" fill="#94a3b8">  rewritten SQL + explanation</text>

  <!-- bottom note: split into 2 lines to avoid overflow -->
  <text x="200" y="448" text-anchor="middle" font-size="9" fill="#475569">TypedDict — Annotated[list, add_messages]</text>
  <text x="200" y="462" text-anchor="middle" font-size="9" fill="#475569">LangGraph handles message merges automatically</text>

  <!-- ── STACK LABEL (bottom right) ── -->
  <text x="900" y="496" text-anchor="end" font-size="9" fill="#334155">Python · LangGraph · BigQuery · Claude · Gemini · FastMCP · Flask</text>

</svg>
