<svg viewBox="0 0 900 510" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">

  <!-- Background -->
  <rect width="900" height="510" fill="#f8fafc" rx="16" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="800" fill="#0f172a">SQL Review Agent — LangGraph State Machine</text>
  <text x="450" y="54" text-anchor="middle" font-size="11" fill="#64748b">static analysis → LLM agentic loop → schema fetch → cost estimate → rewrite</text>

  <!-- ══════════════════════════════════════════════════════════
       ROW 1 : INPUT → STATIC ANALYSIS → call_llm → OUTPUT
  ══════════════════════════════════════════════════════════════ -->

  <!-- INPUT (sky blue) -->
  <rect x="20" y="82" width="148" height="76" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="94"  y="101" text-anchor="middle" font-size="8.5" font-weight="700" letter-spacing="1.5" fill="#0369a1">INPUT</text>
  <text x="94"  y="122" text-anchor="middle" font-size="14"  font-weight="800" fill="#0c4a6e">SQL Query</text>
  <text x="94"  y="142" text-anchor="middle" font-size="9.5" fill="#0369a1">SELECT / WITH only</text>

  <!-- Arrow: INPUT → STATIC -->
  <line x1="168" y1="120" x2="200" y2="120" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="200,115 211,120 200,125" fill="#94a3b8"/>

  <!-- STATIC ANALYSIS (green) -->
  <rect x="211" y="82" width="150" height="76" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="286" y="101" text-anchor="middle" font-size="8"   font-weight="700" letter-spacing="1" fill="#15803d">INSTANT · NO LLM</text>
  <text x="286" y="122" text-anchor="middle" font-size="13"  font-weight="800" fill="#14532d">Static Analysis</text>
  <text x="286" y="141" text-anchor="middle" font-size="9"   fill="#15803d">SELECT* · partitions · JOINs</text>

  <!-- Arrow: STATIC → call_llm (long gap; loop route threads x=390 through this gap)
       Split into two segments with a 6 px hop where the loop crosses at x=390 -->
  <line x1="361" y1="120" x2="387" y2="120" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="393" y1="120" x2="435" y2="120" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="435,115 446,120 435,125" fill="#94a3b8"/>

  <!-- call_llm NODE (blue) -->
  <rect x="446" y="72" width="174" height="96" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <rect x="446" y="72" width="174" height="7"  rx="5"  fill="#2563eb"/>
  <text x="533" y="95"  text-anchor="middle" font-size="8.5" font-weight="700" letter-spacing="1.5" fill="#1d4ed8">NODE</text>
  <text x="533" y="117" text-anchor="middle" font-size="16"  font-weight="800" fill="#1e3a8a">call_llm</text>
  <text x="533" y="137" text-anchor="middle" font-size="10"  fill="#1d4ed8">Claude · Gemini</text>
  <text x="533" y="154" text-anchor="middle" font-size="8.5" fill="#475569">get_schema · dry_run · write_report</text>
  <text x="533" y="166" text-anchor="middle" font-size="8.5" fill="#475569">tools + system prompt per turn</text>

  <!-- write_report exit arrow: call_llm right → OUTPUT left
       Label sits fully in the 84 px gap, right edge (688) clears OUTPUT left (702) by 14 px -->
  <line x1="620" y1="120" x2="700" y2="120" stroke="#059669" stroke-width="2"/>
  <polygon points="700,115 711,120 700,125" fill="#059669"/>
  <rect x="622" y="107" width="74" height="16" rx="4" fill="#f0fdf4" stroke="#059669" stroke-width="1"/>
  <text x="659" y="119" text-anchor="middle" font-size="8.5" font-weight="600" fill="#059669">write_report</text>

  <!-- OUTPUT (emerald) -->
  <rect x="711" y="82" width="148" height="76" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <rect x="711" y="82" width="148" height="7"  rx="5"  fill="#059669"/>
  <text x="785" y="101" text-anchor="middle" font-size="8.5" font-weight="700" letter-spacing="1.5" fill="#047857">OUTPUT</text>
  <text x="785" y="122" text-anchor="middle" font-size="14"  font-weight="800" fill="#064e3b">ReviewReport</text>
  <text x="785" y="142" text-anchor="middle" font-size="9.5" fill="#047857">severity · cost · rewrite</text>

  <!-- ══════════════════════════════════════════════════════════
       ROW 2 : run_tools (directly below call_llm)
  ══════════════════════════════════════════════════════════════ -->

  <!-- Arrow: call_llm → run_tools -->
  <line x1="533" y1="168" x2="533" y2="232" stroke="#2563eb" stroke-width="2"/>
  <polygon points="527,232 533,244 539,232" fill="#2563eb"/>
  <rect x="540" y="185" width="92" height="16" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="586" y="197" text-anchor="middle" font-size="8.5" font-weight="600" fill="#b45309">tool_calls?  yes</text>

  <!-- run_tools NODE (purple) -->
  <rect x="446" y="252" width="174" height="162" rx="12" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <rect x="446" y="252" width="174" height="7"   rx="5"  fill="#7c3aed"/>
  <text x="533" y="275" text-anchor="middle" font-size="8.5" font-weight="700" letter-spacing="1.5" fill="#6d28d9">NODE</text>
  <text x="533" y="296" text-anchor="middle" font-size="16"  font-weight="800" fill="#3b0764">run_tools</text>

  <!-- Tool pills -->
  <rect x="462" y="306" width="142" height="21" rx="5" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="533" y="321" text-anchor="middle" font-size="10" fill="#5b21b6">get_table_schema</text>
  <rect x="462" y="332" width="142" height="21" rx="5" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="533" y="347" text-anchor="middle" font-size="10" fill="#5b21b6">dry_run_sql</text>
  <rect x="462" y="358" width="142" height="21" rx="5" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="533" y="373" text-anchor="middle" font-size="10" fill="#5b21b6">write_report</text>

  <text x="533" y="397" text-anchor="middle" font-size="8.5" fill="#64748b">BQ read-only · safe dispatch</text>

  <!-- ══════════════════════════════════════════════════════════
       LOOP ARROW: run_tools left → x=390 → up → call_llm left
       x=390 sits in the 85 px gap between STATIC right (361) and call_llm left (446).
       Crosses the STATIC→call_llm dashed arrow at (390,120) — the 6 px hop above makes it clean.
  ══════════════════════════════════════════════════════════════ -->
  <path d="M 446 333 L 390 333 L 390 96 L 446 96"
        fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="6,3"/>
  <!-- arrowhead entering call_llm left at y=96 -->
  <polygon points="442,91 446,96 442,101" fill="#7c3aed"/>

  <!-- loop label – sits to the left of x=390, well inside the gap -->
  <rect x="330" y="248" width="58" height="16" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="359" y="260" text-anchor="middle" font-size="8.5" font-weight="600" fill="#7c3aed">loop back</text>

  <!-- ══════════════════════════════════════════════════════════
       LEFT COLUMN : TRIGGER MODES + SHARED STATE
  ══════════════════════════════════════════════════════════════ -->

  <!-- TRIGGER MODES (amber) -->
  <rect x="20" y="194" width="162" height="96" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="101" y="213" text-anchor="middle" font-size="8.5" font-weight="700" letter-spacing="1.2" fill="#b45309">TRIGGER MODES</text>
  <text x="38"  y="235" font-size="10" fill="#78350f">⌘  CLI — agent.py</text>
  <text x="38"  y="255" font-size="10" fill="#78350f">🌐  Web — server.py :5001</text>
  <text x="38"  y="275" font-size="10" fill="#78350f">🔌  MCP — mcp_server.py</text>

  <!-- SHARED STATE (indigo, dashed border) -->
  <rect x="20" y="308" width="400" height="172" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="220" y="328" text-anchor="middle" font-size="8.5" font-weight="700" letter-spacing="1.2" fill="#4338ca">SHARED STATE — flows through every node</text>

  <text x="38"  y="352" font-size="10.5" font-weight="700" fill="#1e1b4b">messages</text>
  <text x="114" y="352" font-size="10.5" fill="#3730a3">  conversation history (auto-appended)</text>

  <text x="38"  y="374" font-size="10.5" font-weight="700" fill="#1e1b4b">sql</text>
  <text x="114" y="374" font-size="10.5" fill="#3730a3">  original query string</text>

  <text x="38"  y="396" font-size="10.5" font-weight="700" fill="#1e1b4b">schemas</text>
  <text x="114" y="396" font-size="10.5" fill="#3730a3">  table metadata from BigQuery</text>

  <text x="38"  y="418" font-size="10.5" font-weight="700" fill="#1e1b4b">report_args</text>
  <text x="114" y="418" font-size="10.5" fill="#3730a3">  rewritten SQL + explanation</text>

  <text x="220" y="446" text-anchor="middle" font-size="8.5" fill="#6366f1">TypedDict — Annotated[list, add_messages]</text>
  <text x="220" y="460" text-anchor="middle" font-size="8.5" fill="#6366f1">LangGraph handles message merges automatically</text>

  <!-- Stack label -->
  <text x="880" y="496" text-anchor="end" font-size="8.5" fill="#94a3b8">Python · LangGraph · BigQuery · Claude · Gemini · FastMCP · Flask</text>

</svg>
